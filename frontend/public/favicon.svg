<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Soft aura behind the orb -->
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5b9cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5b9cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Sphere shading: bright top-left highlight, deeper blue at edge -->
    <radialGradient id="sphere" cx="36%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#a8cbff"/>
      <stop offset="42%"  stop-color="#5b9cf6"/>
      <stop offset="100%" stop-color="#2251b8"/>
    </radialGradient>
    <!-- Crescent shadow: dark radial from bottom-right gives orb depth -->
    <radialGradient id="shadow" cx="72%" cy="70%" r="58%">
      <stop offset="0%"   stop-color="#070d1f" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#070d1f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Aura glow field -->
  <circle cx="16" cy="16" r="15.5" fill="url(#aura)"/>

  <!-- Outer glow ring: 1px, blue at 30% -->
  <circle cx="16" cy="16" r="12"
    fill="none"
    stroke="#5b9cf6"
    stroke-width="1"
    stroke-opacity="0.3"/>

  <!-- Main orb body -->
  <circle cx="16" cy="16" r="10" fill="url(#sphere)"/>

  <!-- Bottom-right crescent shadow overlay -->
  <circle cx="16" cy="16" r="10" fill="url(#shadow)"/>

  <!-- Specular highlight, top-left -->
  <ellipse cx="12.8" cy="12.2" rx="2.4" ry="1.5"
    fill="white" opacity="0.28"
    transform="rotate(-22 12.8 12.2)"/>
</svg>
